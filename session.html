<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loden</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="session">
    <header class="session__header">
      <button class="icon-btn" data-fullscreen type="button" title="Fullscreen" aria-label="Fullscreen">
        <svg data-icon-enter viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
        <svg data-icon-exit viewBox="0 0 24 24" aria-hidden="true" hidden>
          <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
        </svg>
      </button>
    </header>

    <main class="session__main">
      <div class="session__canvas" data-canvas></div>
      <p class="session__phase" data-phase></p>
    </main>

    <footer class="session__footer">
      <button class="session__control session__control--secondary" data-stop type="button" data-i18n="session.end"></button>
    </footer>
  </div>

  <script src="assets/session.js" defer></script>
</body>
</html>
